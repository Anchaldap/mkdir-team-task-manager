<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Task Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,#e0f2ff,#0d6efd);
  color:white;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 35px;
}

header h2{
  font-size:18px;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:18px;
  font-weight:500;
}

nav a:hover{
  color:#d9ecff;
}

/* MAIN */
.main{
  margin-top:90px;
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:400px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h3{
  text-align:center;
  margin-bottom:15px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

textarea{
  resize:none;
  height:80px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(45deg,#ffffff,#d9ecff);
  color:#0d6efd;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

.msg{
  text-align:center;
  margin-top:10px;
  font-size:13px;
}

footer{
  margin-top:auto;
  text-align:center;
  padding:15px;
  background:rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <h2>🚀 Team Task Manager</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="login.html">Logout</a>
  </nav>
</header>

<!-- MAIN -->
<div class="main">

  <div class="card">
    <h3>Create New Task</h3>

    <input type="text" id="title" placeholder="Task Title">

    <select id="team">
      <option>Frontend</option>
      <option>Backend</option>
      <option>AI Team</option>
    </select>

    <textarea id="desc" placeholder="Task Description"></textarea>

    <input type="text" id="assignee" placeholder="Assign To (Name)">

    <button class="btn" onclick="createTask()">Create Task</button>

    <div class="msg" id="msg"></div>
  </div>

</div>

<footer>© 2026 Team Task Manager</footer>

<script>
function createTask(){
  const title=document.getElementById('title').value;
  const team=document.getElementById('team').value;
  const desc=document.getElementById('desc').value;
  const assignee=document.getElementById('assignee').value;
  const msg=document.getElementById('msg');

  if(!title || !desc || !assignee){
    msg.style.color='yellow';
    msg.innerText='Please fill all fields';
    return;
  }

  // demo local storage
  let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');

  tasks.push({
    title,
    team,
    desc,
    assignee,
    status:'Pending'
  });

  localStorage.setItem('tasks',JSON.stringify(tasks));

  msg.style.color='lightgreen';
  msg.innerText='Task Created Successfully ✔';

  setTimeout(()=>{
    window.location.href='dashboard.html';
  },1200);
}
</script>

</body>
</html>
